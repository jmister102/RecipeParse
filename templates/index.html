<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Books</title>
  <link rel="stylesheet" href="static/style.css?v=6">
</head>
<body>

  <!-- Auth View (shown when logged out) -->
  <div id="auth-view">
    <div class="auth-card">
      <div class="auth-logo">🍽️</div>
      <h1 class="auth-title">Recipe Books</h1>
      <p class="auth-subtitle">Save and organize your favorite recipes.</p>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign in</button>
        <button class="auth-tab" data-tab="register">Create account</button>
      </div>

      <!-- Login form -->
      <form id="login-form" class="auth-form" autocomplete="on">
        <input type="text" id="login-username" placeholder="Username" autocomplete="username" required>
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required>
        <button type="submit" class="btn-primary btn-full">Sign in</button>
        <div id="login-error" class="auth-error"></div>
      </form>

      <!-- Register form -->
      <form id="register-form" class="auth-form" hidden autocomplete="off">
        <input type="text" id="reg-username" placeholder="Username (letters, numbers, _)" autocomplete="username" required>
        <input type="email" id="reg-email" placeholder="Email address" autocomplete="email" required>
        <input type="password" id="reg-password" placeholder="Password (8+ characters)" autocomplete="new-password" required>
        <button type="submit" class="btn-primary btn-full">Create account</button>
        <div id="register-error" class="auth-error"></div>
      </form>
    </div>
  </div>

  <!-- App View (shown when logged in) -->
  <div id="app-view" hidden>

    <!-- Header -->
    <header class="site-header">
      <div class="header-inner">
        <h1 class="site-title">Recipe Books</h1>
        <div class="header-controls">
          <input type="search" id="search-input" placeholder="Search recipes..." autocomplete="off">
          <select id="category-filter">
            <option value="">All categories</option>
          </select>
          <select id="sort-select">
            <option value="date-desc">Newest first</option>
            <option value="date-asc">Oldest first</option>
            <option value="title">Title A–Z</option>
          </select>
          <button id="add-btn" class="btn-primary">+ Add Recipe</button>
        </div>
        <div class="user-menu">
          <span id="user-label"></span>
          <button id="logout-btn" class="btn-ghost">Log out</button>
        </div>
      </div>
      <div class="stats-bar" id="stats-bar"></div>
    </header>

    <!-- Recipe Grid -->
    <main class="grid-container" id="grid-container">
      <div class="loading" id="loading">Loading recipes…</div>
      <div class="empty-state" id="empty-state" hidden>
        No recipes yet. Click <strong>+ Add Recipe</strong> to get started.
      </div>
    </main>

  </div><!-- /app-view -->

  <!-- Recipe Detail Modal -->
  <div class="modal-overlay" id="detail-overlay" hidden>
    <div class="modal-box" id="detail-box">
      <button class="modal-close" id="detail-close" aria-label="Close">✕</button>
      <div id="detail-content"></div>
    </div>
  </div>

  <!-- Add Recipe Panel -->
  <div class="modal-overlay" id="add-overlay" hidden>
    <div class="modal-box add-box">
      <button class="modal-close" id="add-close" aria-label="Close">✕</button>
      <h2>Add a Recipe</h2>
      <p class="add-hint">Paste a recipe URL and we'll extract the title, image, ingredients, and instructions.</p>
      <input type="url" id="add-url-input" placeholder="https://..." autocomplete="off">
      <button id="add-submit-btn" class="btn-primary">Scrape &amp; Add</button>
      <div id="add-status"></div>
    </div>
  </div>

  <script src="static/app.js?v=6"></script>
</body>
</html>
